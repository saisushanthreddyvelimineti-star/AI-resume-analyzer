services:
  - type: web
    name: gaia-career-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend_app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: APIFY_API_TOKEN
        sync: false
